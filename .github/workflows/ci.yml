name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: test -z "$(gofmt -l .)"
      - run: go test -race ./...
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: staticcheck ./...
      - run: mkdir -p dist && GOOS=linux GOARCH=amd64 go build -trimpath -o dist/deploy-linux-amd64 ./cmd/deploy && GOOS=linux GOARCH=arm64 go build -trimpath -o dist/deploy-linux-arm64 ./cmd/deploy
